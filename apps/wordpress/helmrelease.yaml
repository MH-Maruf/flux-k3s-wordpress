cat > apps/wordpress/helmrelease.yaml <<'EOF'
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: wordpress
      version: 15.2.23
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    wordpressUsername: admin
    wordpressPassword: admin123
    mariadb:
      enabled: false
    externalDatabase:
      host: mysql.flux-system.svc.cluster.local
      user: wpuser
      database: wordpress
      port: 3306
    secretName: mysql-secret
    secretKey: MYSQL_PASSWORD
    ingress:
      enabled: true
      hostname: app.local
      annotations:
        kubernetes.io/ingress.class: nginx
EOF
